<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My calculator</title>
    <link rel="stylesheet" href="style.css" />

    <!--header font-family-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cossette+Texte:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!--footer font-family-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cossette+Texte:wght@400;700&family=Intel+One+Mono:ital,wght@0,300..700;1,300..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <h1>Basic calculator</h1>
    </header>
    <main>
      <div id="calculator">
        <h3 id="answerDisplay"></h3>
        <div id="calculatorButtonLayout">
          <div id="numberButton">
            <button class="numberButtonDesign">1</button>
            <button class="numberButtonDesign">2</button>
            <button class="numberButtonDesign">3</button>
            <button class="numberButtonDesign">4</button>
            <button class="numberButtonDesign">5</button>
            <button class="numberButtonDesign">6</button>
            <button class="numberButtonDesign">7</button>
            <button class="numberButtonDesign">8</button>
            <button class="numberButtonDesign">9</button>
            <button class="numberButtonDesign">0</button>
          </div>
          <div id="signButton">
            <button id="clear">clear</button>
            <button id="backspace">backspace</button>

            <button class="signButtonDesign">+</button>
            <button class="signButtonDesign">-</button>
            <button class="signButtonDesign">*</button>
            <button class="signButtonDesign">/</button>
            <button id="result">=</button>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <p>&copy; 2026 Anji Bob-manuel</p>
      <p>All right reserved</p>
    </footer>
    <script src="index.js"></script>
  </body>
</html>
